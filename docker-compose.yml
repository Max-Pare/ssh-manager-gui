services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PORT=3001
      - NODE_ENV=production
      - ALLOWED_ORIGIN=http://localhost:3000
    volumes:
      - ssh-mgr-data:/app/backend/data
      - ~/.ssh:/root/.ssh:ro
    restart: unless-stopped

volumes:
  ssh-mgr-data:
